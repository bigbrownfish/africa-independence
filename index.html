<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История независимости | Главное меню</title>
    
    <!-- Подключение шрифтов Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* Базовые стили и минимализм */
        :root {
            --bg-color: #fcfbf9; /* Цвет старой бумаги/пергамента */
            --text-main: #2c3e50; /* Глубокий графитовый */
            --card-bg: #ffffff;
            --hover-color: #f0ede6;
            --border-color: #e2dfd6;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            /* Легкая текстура на фоне */
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 1000px; /* Увеличено для размещения 3-х карточек */
            width: 90%;
        }

        /* Исторический контекст в заголовке */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #1a252f;
        }

        p.subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: #5c6b7a;
            margin-bottom: 3rem;
        }

        /* Навигационные карточки */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        @media (min-width: 800px) {
            .menu-grid {
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap; /* Позволяет карточкам переноситься на новые строки */
            }
        }

        .menu-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 2rem;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            flex: 1;
            min-width: 250px;
            max-width: 280px; /* Карточки не будут растягиваться слишком сильно */
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            background-color: var(--hover-color);
            border-color: #d1cdb8;
        }

        .menu-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin: 0 0 0.5rem 0;
        }

        .menu-card span {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Декоративный разделитель */
        .divider {
            width: 50px;
            height: 2px;
            background-color: #d1cdb8;
            margin: 2rem auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Деколонизация и Субрегионы</h1>
        <p class="subtitle">Интерактивный атлас исторической географии</p>
        
        <div class="divider"></div>

        <div class="menu-grid">
            <a href="africa.html" class="menu-card">
                <h2>Африка</h2>
                <span>Открыть карту</span>
            </a>
            
            <a href="latam.html" class="menu-card">
                <h2>Латинская Америка</h2>
                <span>Открыть карту</span>
            </a>

            <a href="asia.html" class="menu-card">
                <h2>Зарубежная Азия</h2>
                <span>Открыть карту</span>
            </a>
        </div>
    </div>

</body>
</html>
