<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный атлас: История независимости</title>
    <style>
        /* Подключаем современный шрифт */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0b1120;
            /* Создаем стильную координатную сетку на фоне */
            background-image:
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(251, 146, 60, 0.05), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            z-index: 10;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            /* Градиентный текст */
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 1.2rem;
            margin-top: 10px;
            font-weight: 400;
        }

        .menu-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
            padding: 20px;
        }

        /* Карточки с эффектом Glassmorphism */
        .menu-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            width: 320px;
            padding: 40px 30px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Эффект свечения при наведении */
        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.15), rgba(129, 140, 248, 0));
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .menu-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 25px rgba(56, 189, 248, 0.15);
        }

        .menu-card:hover::before {
            opacity: 1;
        }

        .icon {
            font-size: 72px;
            margin-bottom: 25px;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
            transition: transform 0.4s ease;
        }

        .menu-card:hover .icon {
            transform: scale(1.1);
        }

        .menu-card h2 {
            font-size: 1.8rem;
            margin: 0 0 15px 0;
            color: #e2e8f0;
            position: relative;
            z-index: 2;
        }

        .menu-card p {
            color: #cbd5e1;
            line-height: 1.6;
            margin: 0;
            position: relative;
            z-index: 2;
            font-size: 0.95rem;
        }

        /* Декоративные угловые перекрестия в стиле карт */
        .corner-crosshair {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
        }
        .tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
        .bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
        .br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .menu-card { width: 280px; padding: 30px 20px; }
            .corner-crosshair { display: none; }
        }
    </style>
</head>
<body>
    <div class="corner-crosshair tl"></div>
    <div class="corner-crosshair tr"></div>
    <div class="corner-crosshair bl"></div>
    <div class="corner-crosshair br"></div>

    <div class="header">
        <h1>Исторический атлас</h1>
        <p class="subtitle">Хронология обретения независимости государств</p>
    </div>
    
    <div class="menu-container">
        <a href="africa-history.html" class="menu-card">
            <div class="icon">🌍</div>
            <h2>Африка</h2>
            <p>Исследуйте сложный процесс деколонизации и становления новых государств на африканском континенте.</p>
        </a>
        
        <a href="latin-america-history.html" class="menu-card">
            <div class="icon">🌎</div>
            <h2>Латинская Америка</h2>
            <p>Изучите историю освободительных движений и формирование современной политической карты региона.</p>
        </a>
    </div>

</body>
</html>
